name: harborworks-test

services:
  db:
    image: postgres:16-alpine
    container_name: harborworks-test-db
    environment:
      POSTGRES_USER: harbor
      POSTGRES_PASSWORD: harbor_secret
      POSTGRES_DB: harborworks_test
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harbor -d harborworks_test"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - test_net

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: harborworks/tests:latest
    container_name: harborworks-tests
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: harbor
      DB_PASSWORD: harbor_secret
      DB_NAME: harborworks_test
      DB_SSLMODE: disable
      DB_MAX_CONNS: "10"
      APP_HOST: 127.0.0.1
      APP_PORT: "8080"
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      LOG_LEVEL: warn
      COOKIE_SECURE: "false"
      ANALYTICS_ANON_SALT: "test-only-anon-salt"
      UNIT_THRESHOLD: "${UNIT_THRESHOLD:-90.0}"
      API_THRESHOLD: "${API_THRESHOLD:-90.0}"
    networks:
      - test_net

networks:
  test_net:
    driver: bridge
